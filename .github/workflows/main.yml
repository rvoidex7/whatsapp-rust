permissions:
  contents: read
name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: '3.25.3'
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # The "all features" job below compiles the webrtc/opus/mlow tree, which only `voip` pulls in.
  # Gate its expensive steps on a voip-path match so a non-voip change skips that compile; the job
  # still runs, so a required status check stays satisfied.
  changes:
    name: Detect VoIP changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      voip: ${{ steps.filter.outputs.voip }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            voip:
              - 'wacore/src/voip/**'
              - 'src/voip/**'
              # The voip media facade reuses ungated helpers from the send layer
              # (encrypt_for_devices_with_sessions_raw, SessionPlan::assume_ready),
              # so a send-only change can break the --features voip build.
              - 'wacore/src/send/**'
              # Call signaling/types carry #[cfg(feature = "voip")] code that only the
              # --features voip build compiles, so a change to just these would otherwise
              # skip the voip checks.
              - 'src/handlers/call.rs'
              - 'src/client/voip.rs'
              - 'wacore/src/stanza/call.rs'
              - 'wacore/src/types/call.rs'
              # Client hooks carry #[cfg(feature = "voip")] fields, connection teardown, and a session
              # helper that only the --features voip build compiles.
              - 'src/client.rs'
              - 'src/client/lifecycle.rs'
              - 'src/client/sessions.rs'
              - 'examples/voip.rs'
              - 'examples/observability.rs'
              - 'examples/metrics.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'wacore/Cargo.toml'
              - '.github/workflows/main.yml'

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-16
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-16
          components: clippy
      # The voip example (built under --all-targets) links cpal, which needs ALSA headers.
      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-16
      # The voip example (built under --all-targets) links cpal, which needs ALSA headers.
      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
      - name: Build project
        run: cargo build --workspace --exclude e2e-tests --all-targets --verbose
      - name: Run tests
        run: cargo test --workspace --exclude e2e-tests --verbose -- --nocapture

  test-all-features:
    name: Build & Lint (all features)
    runs-on: ubuntu-latest
    needs: changes
    # Accepted trade-off: non-voip feature-gated code (tracing / metrics / debug) only gets
    # --all-features coverage on a voip or manifest PR. Those are optional and compile-time only,
    # so any breakage surfaces on the next such PR, not at runtime.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        if: needs.changes.outputs.voip == 'true'
        with:
          toolchain: nightly-2026-06-16
      # The voip example (built under --all-features --all-targets) links cpal,
      # which needs ALSA on Linux.
      - name: Install ALSA dev headers
        if: needs.changes.outputs.voip == 'true'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install protoc
        if: needs.changes.outputs.voip == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - name: Setup sccache
        if: needs.changes.outputs.voip == 'true'
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust registry
        if: needs.changes.outputs.voip == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
      - name: Build (all features)
        if: needs.changes.outputs.voip == 'true'
        run: cargo build --workspace --exclude e2e-tests --all-features --all-targets --verbose
      - name: Clippy (all features)
        if: needs.changes.outputs.voip == 'true'
        run: cargo clippy --workspace --exclude e2e-tests --all-features --all-targets -- -D warnings
      # No `cargo test --all-features`: it enables the `danger-skip-*-verify` flags, which disable
      # security verification (the cert-chain negative test is even cfg'd out), so the suite would
      # change behavior rather than catch rot; build + clippy cover that. The voip suite runs under
      # the explicit `voip` feature set instead, never `--all-features`.
      - name: Test (voip)
        if: needs.changes.outputs.voip == 'true'
        run: |
          cargo test -p wacore --features voip --lib
          cargo test -p whatsapp-rust --features "voip tokio-native tokio-transport" --lib

  test-stable:
    name: Test Stable (no-simd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
      - name: Build wacore-binary (stable, no SIMD)
        run: cargo build -p wacore-binary --no-default-features --verbose
      - name: Test wacore-binary (stable, no SIMD)
        run: cargo test -p wacore-binary --no-default-features --lib --verbose
      - name: Build wacore-appstate (stable, no SIMD)
        run: cargo build -p wacore-appstate --no-default-features --verbose
      - name: Test wacore-appstate (stable, no SIMD)
        run: cargo test -p wacore-appstate --no-default-features --lib --verbose
      - name: Build wacore (stable, no SIMD)
        run: cargo build -p wacore --no-default-features --verbose
      - name: Test wacore (stable, no SIMD)
        run: cargo test -p wacore --no-default-features --lib --verbose